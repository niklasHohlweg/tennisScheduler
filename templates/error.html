{% extends "base.html" %}

{% block title %}Fehler{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto text-center py-20">
    <div class="bg-white rounded-2xl shadow-lg border border-[#D9D9D9] p-12">
        <!-- Error Icon -->
        <div class="mb-6">
            <div class="w-20 h-20 mx-auto bg-red-100 rounded-full flex items-center justify-center">
                <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
        </div>
        
        <!-- Error Title -->
        <h1 class="text-3xl font-bold text-[#0F3A4A] mb-4">Oops! Ein Fehler ist aufgetreten</h1>
        
        <!-- Error Message -->
        <div class="mb-8 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg">
            <p class="text-[#1A1A1A] font-medium">{{ error }}</p>
        </div>
        
        <!-- Action Button -->
        <a href="{{ url_for('dashboard') }}" 
           class="inline-flex items-center gap-2 px-8 py-3 bg-[#A8D430] text-white rounded-lg font-semibold hover:bg-[#8FB828] hover:shadow-lg hover:scale-[1.02] transition-all duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Zurück zum Dashboard
        </a>
    </div>
</div>
{% endblock %}
