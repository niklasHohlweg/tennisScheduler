{% extends "base.html" %}

{% block title %}Neues Turnier erstellen - JuNi OPEN{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6 sm:mb-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-brand-text mb-2">Neues Turnier erstellen</h1>
        <p class="text-sm sm:text-base text-gray-600 font-medium">Konfigurieren Sie Ihr Turnier</p>
    </div>

    <div class="bg-white rounded-brand shadow-sm border border-brand-border p-4 sm:p-8" x-data="tournamentForm()">
        <form method="POST" action="{{ url_for('create_tournament') }}">
            <!-- Tournament Name -->
            <div class="mb-6">
                <label for="name" class="block text-sm font-semibold text-brand-text mb-2">
                    Turniername *
                </label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    required
                    class="w-full px-4 py-3 border-2 border-brand-border rounded-brand focus:ring-2 focus:ring-brand-green focus:border-brand-green text-base min-h-[48px]"
                    placeholder="z.B. Sommer Tennis Cup 2026"
                >
            </div>

            <!-- Mode Selection -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-brand-text mb-3">
                    Turnier-Modus *
                </label>
                <div class="grid gap-4">
                    <label class="relative flex items-start p-4 sm:p-5 border-2 rounded-brand cursor-pointer card-hover min-h-[60px]"
                           :class="mode === 'time_based' ? 'border-brand-green bg-green-50' : 'border-brand-border'">
                        <input type="radio" name="mode" value="time_based" x-model="mode" class="mt-1 accent-brand-green" checked>
                        <div class="ml-3">
                            <span class="block font-bold text-brand-text mb-1 text-sm sm:text-base">⏱️ Zeitbasiert</span>
                            <span class="block text-xs sm:text-sm text-gray-600">Maximale Matches in gegebener Zeit</span>
                        </div>
                    </label>
                    <label class="relative flex items-start p-4 sm:p-5 border-2 rounded-brand cursor-pointer card-hover min-h-[60px]"
                           :class="mode === 'round_robin' ? 'border-brand-green bg-green-50' : 'border-brand-border'">
                        <input type="radio" name="mode" value="round_robin" x-model="mode" class="mt-1 accent-brand-green">
                        <div class="ml-3">
                            <span class="block font-bold text-brand-text mb-1 text-sm sm:text-base">🔄 Round Robin</span>
                            <span class="block text-xs sm:text-sm text-gray-600">Jedes Team spielt gegen jedes</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Configuration Grid -->
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 mb-6">
                <div>
                    <label for="num_teams" class="block text-sm font-semibold text-brand-text mb-2">
                        Anzahl Teams *
                    </label>
                    <input 
                        type="number" 
                        id="num_teams" 
                        name="num_teams" 
                        x-model.number="numTeams"
                        min="2" 
                        max="50" 
                        value="4"
                        required
                        class="w-full px-4 py-3 border-2 border-brand-border rounded-brand focus:ring-2 focus:ring-brand-green focus:border-brand-green text-base min-h-[48px]"
                    >
                </div>

                <div>
                    <label for="num_courts" class="block text-sm font-semibold text-brand-text mb-2">
                        Anzahl Plätze *
                    </label>
                    <input 
                        type="number" 
                        id="num_courts" 
                        name="num_courts" 
                        min="1" 
                        max="20" 
                        value="2"
                        required
                        class="w-full px-4 py-3 border-2 border-brand-border rounded-brand focus:ring-2 focus:ring-brand-green focus:border-brand-green"
                    >
                </div>

                <div>
                    <label for="players_per_team" class="block text-sm font-semibold text-brand-text mb-2">
                        Spieler pro Team *
                    </label>
                    <input 
                        type="number" 
                        id="players_per_team" 
                        name="players_per_team" 
                        min="2" 
                        max="10" 
                        value="4"
                        required
                        class="w-full px-4 py-3 border-2 border-brand-border rounded-brand focus:ring-2 focus:ring-brand-green focus:border-brand-green"
                    >
                </div>
            </div>

            <!-- Team Names -->
            <div class="mb-8">
                <label class="block text-sm font-semibold text-brand-text mb-2">
                    Team-Namen (optional)
                </label>
                <p class="text-sm text-gray-600 mb-3 font-medium">Leer lassen für automatische Namen (Team 1, Team 2, ...)</p>
                <div class="space-y-2" id="team-names">
                    <template x-for="i in numTeams" :key="i">
                        <input 
                            type="text" 
                            :name="'team_' + (i - 1)" 
                            :placeholder="'Team ' + i"
                            class="w-full px-4 py-3 border-2 border-brand-border rounded-brand focus:ring-2 focus:ring-brand-green focus:border-brand-green"
                        >
                    </template>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="flex justify-end space-x-3 pt-4 border-t border-brand-border">
                <a href="{{ url_for('dashboard') }}" class="btn-secondary px-6 py-3 border-2 border-brand-border rounded-brand text-brand-text hover:bg-brand-bg font-semibold">
                    Abbrechen
                </a>
                <button 
                    type="submit" 
                    class="btn-primary px-8 py-3 bg-brand-green text-white rounded-brand font-semibold"
                >
                    Turnier erstellen →
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function tournamentForm() {
    return {
        mode: 'time_based',
        numTeams: 4
    }
}
</script>
{% endblock %}
