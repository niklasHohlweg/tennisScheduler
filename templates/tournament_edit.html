{% extends "base.html" %}

{% block title %}Turnier bearbeiten{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-[#0F3A4A] mb-2">Turnier bearbeiten</h1>
        <p class="text-gray-600">{{ tournament.name }}</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-[#D9D9D9] p-8">
        <form method="POST" action="{{ url_for('edit_tournament', tournament_id=tournament.id) }}">
            <div class="mb-8">
                <label for="name" class="block text-sm font-semibold text-[#1A1A1A] mb-2">
                    Turniername *
                </label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    value="{{ tournament.name }}"
                    required
                    class="w-full px-4 py-3 border-2 border-[#D9D9D9] rounded-lg focus:ring-2 focus:ring-[#A8D430] focus:border-[#A8D430] transition-all duration-150"
                >
            </div>

            <div class="flex justify-end gap-3">
                <a href="{{ url_for('tournament_detail', tournament_id=tournament.id) }}" 
                   class="px-6 py-3 border-2 border-[#D9D9D9] rounded-lg text-[#1A1A1A] font-semibold hover:border-[#1F6F78] hover:bg-[#F4F6F5] transition-all duration-150">
                    Abbrechen
                </a>
                <button 
                    type="submit" 
                    class="px-6 py-3 bg-[#A8D430] text-white rounded-lg font-semibold hover:bg-[#8FB828] hover:shadow-lg hover:scale-[1.02] transition-all duration-150"
                >
                    💾 Speichern
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
