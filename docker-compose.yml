services:
  postgres:
    image: postgres:16-alpine
    container_name: tennis-db
    environment:
      - POSTGRES_USER=tennis_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=tennis_scheduler
    volumes:
      - tennis_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tennis-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennis_user -d tennis_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  tennis-scheduler:
    build: .
    container_name: tennis-app
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tennis_scheduler
      - DB_USER=tennis_user
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tennis-internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.tennis.rule=Host(`juni.niknetic.de`)"
      - "traefik.http.routers.tennis.entrypoints=websecure"
      - "traefik.http.routers.tennis.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tennis.middlewares=security-headers@file"
      - "traefik.http.services.tennis.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  tennis_postgres_data:
    driver: local

networks:
  tennis-internal:
    driver: bridge
  proxy:
    external: true