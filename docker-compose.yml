version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tennis-db
    environment:
      - POSTGRES_USER=tennis_user
      - POSTGRES_PASSWORD=tennis_password
      - POSTGRES_DB=tennis_scheduler
    volumes:
      - tennis_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennis_user -d tennis_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  tennis-scheduler:
    build: .
    ports:
      - "10.20.0.1:8501:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change-this-secret-key-in-production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tennis_scheduler
      - DB_USER=tennis_user
      - DB_PASSWORD=tennis_password
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    container_name: tennis-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  tennis_postgres_data:
    driver: local